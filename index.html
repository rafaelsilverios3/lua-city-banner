<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lua City Banner</title>
  <style>
    :root {
      color-scheme: dark;
      background: #050505;
      color: #ead8a4;
      font-family: Georgia, "Times New Roman", serif;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 32px;
      box-sizing: border-box;
      background:
        radial-gradient(circle at 50% 10%, rgba(184, 139, 57, 0.22), transparent 36%),
        linear-gradient(180deg, #070707, #010101);
    }

    main {
      width: min(1280px, 100%);
    }

    img {
      width: 100%;
      height: auto;
      display: block;
      border: 1px solid rgba(218, 180, 92, 0.45);
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.65);
    }

    a {
      color: #d9bb73;
      display: inline-block;
      margin-top: 18px;
      word-break: break-all;
    }
  </style>
</head>

<body>
  <main>
    <img src="./nuvem/banner.png" alt="Banner Lua City" />
    <a href="./nuvem/banner.png">/nuvem/banner.png</a>
  </main>
</body>

</html>
